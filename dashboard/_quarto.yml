project:
  type: website
  output-dir: _site
  resources:
    - "data/**"

website:
  title: "Margins — The Corpus"
  description: "A Margins-scope dashboard of the Bibliography of the Hebrew Book (BHB), 1470–1800."
  navbar:
    background: light
    left:
      - href: index.qmd
        text: Home
      - href: corpus/index.qmd
        text: The Corpus
      - href: desiderata/index.qmd
        text: Desiderata
      - href: methods/bibliographic_units_and_marc.qmd
        text: Methods
      - href: about.qmd
        text: About
    right:
      - icon: github
        href: https://github.com/sinairusinek/Margins
        aria-label: GitHub
  page-footer:
    left: "Margins ERC dashboard. Built on the BHB / DiJeSt data and the KIMA gazetteer."
    right: "Generated by Quarto."

format:
  html:
    theme: cosmo
    toc: true
    toc-depth: 3
    code-fold: true
    fig-responsive: true
    smooth-scroll: true
    css: styles.css
    include-in-header:
      - text: |
          <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
          <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
          <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
